<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>정밀 진단 리포트</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root { --primary: #2563EB; --bg: #F8FAFC; --card: #FFFFFF; --text-main: #0F172A; }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg); color: var(--text-main); line-height: 1.6; }
        .container { max-width: 600px; margin: 0 auto; min-height: 100vh; background: var(--card); padding-bottom: 120px; box-shadow: 0 0 40px rgba(0,0,0,0.03); }
        #loading { position: fixed; inset: 0; background: #fff; z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .header { padding: 50px 25px 30px; border-bottom: 1px solid #F1F5F9; }
        .clinic-badge { display: inline-flex; align-items: center; gap: 6px; color: var(--primary); font-weight: 800; font-size: 14px; margin-bottom: 16px; background: #EFF6FF; padding: 8px 14px; border-radius: 10px; }
        .greeting h1 { font-size: 28px; font-weight: 800; line-height: 1.3; }
        .greeting h1 span { color: var(--primary); }
        .card { margin: 30px 20px; }
        .card-title { font-size: 16px; font-weight: 700; color: var(--primary); margin-bottom: 18px; display: flex; align-items: center; gap: 10px; }
        .img-container { width: 100%; border-radius: 20px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.08); margin-bottom: 20px; border: 1px solid #F1F5F9; }
        .img-container img { width: 100%; display: block; }
        .content-box { background: #F8FAFC; padding: 24px; border-radius: 16px; border-left: 6px solid var(--primary); white-space: pre-wrap; font-size: 15px; color: #334155; }
        .footer-cta { position: fixed; bottom: 0; left: 0; right: 0; max-width: 600px; margin: 0 auto; background: rgba(255,255,255,0.9); backdrop-filter: blur(15px); padding: 20px; border-top: 1px solid #F1F5F9; }
        .btn { background: var(--primary); color: white; text-align: center; padding: 18px; border-radius: 14px; display: block; text-decoration: none; font-weight: 700; box-shadow: 0 10px 25px rgba(37,99,235,0.25); }
        .debug-msg { background: #FFF1F2; color: #BE123C; padding: 20px; border-radius: 12px; margin: 20px; font-size: 14px; border: 1px dashed #FB7185; }
    </style>
</head>
<body>
    <div id="loading"><div class="spinner"></div><p style="margin-top:15px; color:#64748B; font-weight:600;">환자님의 리포트 연결 중...</p></div>
    <div id="error-display" style="display:none;"></div>

    <div class="container" id="main-content" style="display:none;">
        <header class="header">
            <div class="clinic-badge"><i class="fa-solid fa-tooth"></i> <span id="clinic">로딩중...</span></div>
            <div class="greeting"><h1><span id="patient">환자</span>님을 위해<br>정성껏 준비했습니다.</h1></div>
        </header>

        <div class="card">
            <div class="card-title"><i class="fa-solid fa-stethoscope"></i> 진단 사진 및 소견</div>
            <div class="img-container" id="diag-img-box" style="display:none;">
                <img id="diag-img" src="" alt="진단 사진">
            </div>
            <div id="opinion" class="content-box">진단 내용을 불러오고 있습니다.</div>
        </div>

        <div class="card" id="sec-plan" style="display:none;">
            <div class="card-title"><i class="fa-regular fa-calendar-check"></i> 맞춤 치료 계획</div>
            <div id="plan" class="content-box"></div>
        </div>

        <div class="footer-cta"><a id="phone-btn" href="" class="btn">상담 및 예약 문의하기</a></div>
    </div>

    <script>
        // 🚨 관리자님의 사진(image_5288ff.png)에서 확인한 실제 정보입니다.
        const AIRTABLE_TOKEN = "patoWJBEiYsg7SA3t.acb39f0bf976ca515ca3043e6a5e52129daff3f1c06066ad349079bb53b3d53f";
        const BASE_ID = "appxMuv95Sk0HyDyh";
        const TABLE_ID = "tblLZul1rejGLASDU"; // 한글 이름 대신 고유 ID를 사용하여 에러 원천 차단!

        async function fetchReportData() {
            const params = new URLSearchParams(window.location.search);
            const recordId = params.get('id');

            if(!recordId) {
                showError("잘못된 링크입니다. 에어테이블에서 생성된 최신 링크를 확인해주세요.");
                return;
            }

            try {
                // Table ID를 사용한 다이렉트 호출
                const url = `https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}/${recordId}`;
                
                const response = await fetch(url, {
                    headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` }
                });

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(`에어테이블 연결 실패: ${errorData.error.message}`);
                }

                const data = await response.json();
                const fields = data.fields;

                // [데이터 매핑] - 사진(image_5288ff.png)에 있는 이름과 100% 일치시킴
                document.getElementById('clinic').innerText = fields["병원명(자동)"] || "모리치과";
                document.getElementById('patient').innerText = fields["환자 성함"] || "환자";
                
                // 진단 소견 및 사진 (화면 우측에 숨겨져 있을 것으로 판단되어 기존 이름 유지)
                document.getElementById('opinion').innerText = fields["진단 소견"] || "진단 내용이 아직 입력되지 않았습니다.";

                if(fields["진단 사진"] && fields["진단 사진"][0]) {
                    document.getElementById('diag-img').src = fields["진단 사진"][0].url;
                    document.getElementById('diag-img-box').style.display = 'block';
                }

                if(fields["맞춤치료계획"]) {
                    document.getElementById('plan').innerText = fields["맞춤치료계획"];
                    document.getElementById('sec-plan').style.display = 'block';
                }

                // 사진 속의 실제 필드명 '병원연락처(자동)'으로 수정 완료!
                const phoneNum = fields["병원연락처(자동)"] || "010-5464-1768";
                document.getElementById('phone-btn').href = "tel:" + phoneNum;
                
                document.getElementById('loading').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';

            } catch (error) {
                showError(error.message);
            }
        }

        function showError(msg) {
            document.getElementById('loading').style.display = 'none';
            const errDiv = document.getElementById('error-display');
            errDiv.style.display = 'block';
            errDiv.innerHTML = `<div class="debug-msg"><b>❌ 리포트 연결 실패</b><br><br>${msg}<br><br><b>💡 해결책:</b> 에어테이블 '환자정보' 테이블에 <b>'진단 소견'</b> 칸이 있는지 확인해주세요.</div>`;
        }

        window.onload = fetchReportData;
    </script>
</body>
</html>
