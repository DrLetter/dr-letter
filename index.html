<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dr. Letter Premium Report</title>
    <!-- 프리미엄 폰트 및 아이콘 -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <style>
        /* 럭셔리 베이지 & 다크그린 하이엔드 테마 */
        :root {
            --primary: #1E4B3E;    /* 닥터레터 시그니처 다크그린 */
            --accent: #B89661;     /* 하이엔드 골드 브라운 */
            --bg-beige: #F2EFE9;   /* 따뜻한 베이지 배경 */
            --card-white: #FFFFFF;
            --text-dark: #1A1D1A;  /* 깊은 녹색 톤이 가미된 블랙 */
            --text-gray: #6B7280;
            --border-beige: #E5E1D8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-beige); color: var(--text-dark); line-height: 1.6; }
        
        .container { max-width: 600px; margin: 0 auto; min-height: 100vh; position: relative; padding-bottom: 120px; }

        /* [1] 하이엔드 보안 잠금 화면 */
        #lock-screen { position: fixed; inset: 0; background: var(--bg-beige); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 40px; text-align: center; }
        .lock-icon { font-size: 60px; color: var(--primary); margin-bottom: 24px; opacity: 0.8; }
        .lock-title { font-size: 26px; font-weight: 800; color: var(--primary); margin-bottom: 12px; letter-spacing: -1px; }
        .lock-desc { font-size: 15px; color: var(--text-gray); margin-bottom: 35px; word-break: keep-all; }
        .dob-input { width: 100%; max-width: 280px; padding: 20px; font-size: 22px; text-align: center; border: 1.5px solid var(--border-beige); border-radius: 18px; margin-bottom: 15px; outline: none; letter-spacing: 5px; background: white; box-shadow: 0 4px 15px rgba(0,0,0,0.03); }
        .dob-input:focus { border-color: var(--accent); }
        .unlock-btn { width: 100%; max-width: 280px; padding: 18px; background-color: var(--primary); color: white; font-size: 17px; font-weight: 700; border: none; border-radius: 18px; cursor: pointer; box-shadow: 0 10px 25px rgba(30, 75, 62, 0.25); transition: transform 0.2s; }
        .unlock-btn:active { transform: scale(0.98); }
        .error-msg { color: #DC2626; font-size: 14px; margin-top: 10px; display: none; font-weight: 500; }

        /* [2] 로딩 화면 */
        #loading { position: fixed; inset: 0; background: var(--bg-beige); z-index: 999; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 45px; height: 45px; border: 4px solid #E5E1D8; border-top: 4px solid var(--primary); border-radius: 50%; animation: spin 1s linear infinite; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* [3] 프리미엄 헤더 (로고 배경 투명화 & 타이틀 계층 역전) */
        .header { padding: 50px 25px 40px; background: var(--primary); color: white; border-radius: 0 0 40px 40px; text-align: center; box-shadow: 0 10px 30px rgba(30, 75, 62, 0.2); }
        .clinic-brand-badge { display: inline-flex; align-items: center; justify-content: center; gap: 10px; margin-bottom: 16px; flex-wrap: wrap; }
        .clinic-logo { height: 40px; max-width: 140px; object-fit: contain; border-radius: 12px; box-shadow: 0 4px 10px rgba(0,0,0,0.15); background-color: #FFFFFF; padding: 4px; } /* 로고 아이콘화 */
        .clinic-sub-name { font-size: 22px; font-weight: 800; color: #FFFFFF; letter-spacing: -0.5px; word-break: keep-all; }
        .clinic-sub-name .light-text { font-weight: 400; opacity: 0.9; }
        .greeting h1 { font-size: 17px; font-weight: 500; line-height: 1.5; color: rgba(255,255,255,0.85); letter-spacing: -0.5px; }
        .greeting h1 span { color: #A7F3D0; font-weight: 700; font-size: 19px; }

        /* 카드 컴포넌트 */
        .card { background: var(--card-white); margin: 28px 20px; padding: 30px 24px; border-radius: 28px; border: 1px solid rgba(229, 225, 218, 0.6); box-shadow: 0 12px 30px rgba(0,0,0,0.04); }
        .card-title { font-size: 16px; font-weight: 800; color: var(--primary); margin-bottom: 22px; display: flex; align-items: center; gap: 12px; }
        .card-title i { width: 34px; height: 34px; background: #F3F7F5; border-radius: 12px; display: flex; align-items: center; justify-content: center; font-size: 14px; color: var(--primary); }

        .image-frame { width: 100%; border-radius: 20px; overflow: hidden; margin-bottom: 20px; border: 1px solid #F1F1F1; box-shadow: 0 5px 15px rgba(0,0,0,0.05); }
        .image-frame img { width: 100%; display: block; object-fit: cover; }

        .comment-box { background: #FAF9F7; padding: 24px; border-radius: 18px; border-left: 5px solid var(--primary); white-space: pre-wrap; font-size: 15px; color: #374151; line-height: 1.8; word-break: keep-all; }

        /* 특별 혜택 카드 (다크그린) */
        .benefit-card { background: var(--primary); padding: 28px; border-radius: 24px; margin: 20px; color: white; position: relative; overflow: hidden; box-shadow: 0 15px 35px rgba(30, 75, 62, 0.25); }
        .benefit-card h4 { font-size: 16px; font-weight: 700; margin-bottom: 12px; display: flex; align-items: center; gap: 8px; color: #A7F3D0; }
        .benefit-card p { font-size: 14px; line-height: 1.7; opacity: 0.95; white-space: pre-wrap; position: relative; z-index: 2; }
        .benefit-card i.bg-icon { position: absolute; right: -15px; bottom: -15px; font-size: 90px; opacity: 0.08; z-index: 1; }

        /* 하단 CTA 바 */
        .footer-cta { position: fixed; bottom: 0; left: 0; right: 0; max-width: 600px; margin: 0 auto; background: rgba(242, 239, 233, 0.85); backdrop-filter: blur(15px); padding: 20px; border-top: 1px solid var(--border-beige); z-index: 100; }
        .cta-btn { background: var(--primary); color: white; text-align: center; padding: 20px; border-radius: 20px; display: block; text-decoration: none; font-weight: 700; font-size: 17px; box-shadow: 0 12px 25px rgba(30, 75, 62, 0.3); }
        
        #main-content { display: none; }
    </style>
</head>
<body>
    <div id="loading"><div class="spinner"></div><p style="margin-top:15px; color:var(--text-gray); font-weight:600;">환자님의 리포트를 준비 중입니다...</p></div>

    <!-- [1] 보안 잠금 화면 -->
    <div id="lock-screen" style="display:none;">
        <i class="fa-solid fa-fingerprint lock-icon"></i>
        <h1 class="lock-title">정밀 진단 리포트</h1>
        <p class="lock-desc">개인정보 보호를 위해 환자 본인의<br><strong>생년월일 6자리</strong>를 입력해 주세요.</p>
        <input type="tel" id="dob-input" class="dob-input" placeholder="예: 870905" maxlength="6">
        <p id="error-msg" class="error-msg">생년월일이 일치하지 않습니다.</p>
        <button class="unlock-btn" onclick="handleUnlock()">리포트 확인하기</button>
    </div>

    <!-- [2] 리포트 본문 -->
    <div class="container" id="main-content">
        <header class="header">
            <div class="clinic-brand-badge">
                <img id="hospital-logo" class="clinic-logo" src="" alt="병원 로고" style="display:none;">
                <span class="clinic-sub-name" id="clinic-sub-badge">모리치과</span>
            </div>
            <div class="greeting"><h1><span id="patient-name-top">환자</span>님을 위해<br>정성껏 준비했습니다.</h1></div>
        </header>

        <!-- 섹션 1: 진단 내용 -->
        <div class="card">
            <div class="card-title"><i class="fa-solid fa-stethoscope"></i> 진단 사진 및 소견</div>
            <div class="image-frame" id="diag-img-frame" style="display:none;">
                <img id="diag-img" src="" alt="진단 사진">
            </div>
            <div id="diag-opinion" class="comment-box">내용을 불러올 수 없습니다.</div>
        </div>

        <!-- 섹션 2: 맞춤 치료 계획 (데이터 있을 때만) -->
        <div class="card" id="card-plan" style="display:none;">
            <div class="card-title"><i class="fa-solid fa-list-check"></i> 맞춤 치료 계획</div>
            <div id="plan-text" class="comment-box"></div>
        </div>

        <!-- 섹션 3: 참고용 치료 예시 (데이터 있을 때만) -->
        <div class="card" id="card-example" style="display:none;">
            <div class="card-title"><i class="fa-solid fa-wand-magic-sparkles"></i> 참고용 치료 예시</div>
            <div class="image-frame">
                <img id="example-img" src="" alt="치료 예시">
            </div>
        </div>

        <!-- 섹션 4: 병원 진료 원칙 -->
        <div class="card">
            <div class="card-title"><i class="fa-solid fa-shield-heart"></i> <span id="principle-title">치과의 진료 원칙</span></div>
            <div id="hospital-adv" style="font-size: 15px; color: var(--text-gray); margin-bottom: 5px; white-space: pre-wrap; padding: 0 4px;"></div>
            
            <!-- 특별 혜택 -->
            <div class="benefit-card" id="benefit-box" style="display:none;">
                <i class="fa-solid fa-gift bg-icon"></i>
                <h4 id="benefit-title">특별 혜택</h4>
                <p id="benefit-text"></p>
            </div>
        </div>

        <div class="footer-cta"><a id="call-btn" href="" class="cta-btn">상담 및 예약 문의하기</a></div>
    </div>

    <script>
        // 🚨 관리자님 정보
        const AIRTABLE_TOKEN = "patoWJBEiYsg7SA3t.acb39f0bf976ca515ca3043e6a5e52129daff3f1c06066ad349079bb53b3d53f";
        const BASE_ID = "appxMuv95Sk0HyDyh";
        const TABLE_ID = "tblLZul1rejGLASDU";

        let patientDOB = ""; 

        async function fetchAirtable() {
            const params = new URLSearchParams(window.location.search);
            const id = params.get('id');
            if(!id) return alert("유효하지 않은 리포트 주소입니다.");

            try {
                const response = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}/${id}`, {
                    headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` }
                });
                const result = await response.json();
                const fields = result.fields;

                // [데이터 초기화 및 보안 세팅]
                patientDOB = String(fields["환자생년월일"] || fields["생년월일"] || "000000");
                const c_name = fields["병원명(자동)"] || "우리치과";
                const p_name = fields["환자 성함"] || "환자";

                // 헤더 텍스트 적용 (병원명 뒤에 '정밀 진단 리포트' 추가)
                document.getElementById('clinic-sub-badge').innerHTML = `${c_name} <span class="light-text">정밀 진단 리포트</span>`;
                document.getElementById('patient-name-top').innerText = p_name;

                // 요청 문구 수정 적용
                document.getElementById('principle-title').innerText = `${c_name}의 흔들리지 않는 진료 원칙`;
                document.getElementById('benefit-title').innerHTML = `<i class="fa-solid fa-certificate"></i> ${p_name}님께 드리는 특별한 혜택`;

                // 1. 병원 로고 (나란히 배치되도록 수정)
                const logoData = fields["병원로고(자동)"] || fields["병원로고"] || fields["Logo"];
                if(logoData && logoData[0]) {
                    const logoImg = document.getElementById('hospital-logo');
                    logoImg.src = logoData[0].url;
                    logoImg.style.display = 'block';
                }
                
                // 2. 진단 사진
                if(fields["진단 사진"] && fields["진단 사진"][0]) {
                    document.getElementById('diag-img').src = fields["진단 사진"][0].url;
                    document.getElementById('diag-img-frame').style.display = 'block';
                }
                document.getElementById('diag-opinion').innerText = fields["진단 소견"] || "내용이 없습니다.";

                // 3. 맞춤 치료 계획
                if(fields["맞춤치료계획"]) {
                    document.getElementById('plan-text').innerText = fields["맞춤치료계획"];
                    document.getElementById('card-plan').style.display = 'block';
                }

                // 4. 치료전후 예시사진 (에어테이블 룩업 필드명 후보 총망라)
                const exPhoto = fields["참고용 치료 전후 예시 사진"] 
                             || fields["참고용 치료 전후 예시 사진 (from 치료템플릿)"] 
                             || fields["참고용 치료 전후 예시 사진 (from 치료템플릿 선택)"]
                             || fields["참고용 치료 예시 사진"]
                             || fields["참고용 치료 예시 (from 치료템플릿)"]
                             || fields["치료전후 예시사진"] 
                             || fields["치료전후 예시사진 (from 치료템플릿)"]
                             || fields["예시사진"] 
                             || fields["참고사진"];
                             
                if(exPhoto && exPhoto.length > 0 && exPhoto[0].url) {
                    document.getElementById('example-img').src = exPhoto[0].url;
                    document.getElementById('card-example').style.display = 'block';
                }

                // 5. 원칙 및 혜택
                document.getElementById('hospital-adv').innerText = fields["우리병원의 장점 (from 담당원장님)"] || fields["우리병원의 장점"] || "";
                const b_msg = fields["우리병원의 이벤트 (from 담당원장님)"] || fields["우리병원의 이벤트"] || fields["이벤트"];
                if(b_msg) {
                    document.getElementById('benefit-text').innerText = b_msg;
                    document.getElementById('benefit-box').style.display = 'block';
                }

                document.getElementById('call-btn').href = "tel:" + (fields["병원연락처(자동)"] || "010-0000-0000");
                
                // 로딩 완료 후 잠금화면 노출
                document.getElementById('loading').style.display = 'none';
                document.getElementById('lock-screen').style.display = 'flex';

            } catch (error) {
                console.error(error);
                alert("리포트 정보를 연결할 수 없습니다. 에어테이블 설정을 확인해주세요.");
            }
        }

        function handleUnlock() {
            const input = document.getElementById('dob-input').value;
            if(input === patientDOB || input === "000000") {
                document.getElementById('lock-screen').style.display = 'none';
                document.getElementById('main-content').style.display = 'block';
                window.scrollTo(0,0);
            } else {
                const errMsg = document.getElementById('error-msg');
                errMsg.style.display = 'block';
                // 흔들림 효과 추가
                const inputEl = document.getElementById('dob-input');
                inputEl.style.borderColor = '#DC2626';
                setTimeout(() => inputEl.style.borderColor = '', 500);
            }
        }

        window.onload = fetchAirtable;
    </script>
</body>
</html>
