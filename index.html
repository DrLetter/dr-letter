<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Dr. Letter 프리미엄 리포트</title>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/gh/orioncactus/pretendard@v1.3.9/dist/web/static/pretendard.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        :root {
            --brand-dark: #1E4B3E;
            --brand-emerald: #10B981;
            --bg-beige: #F2EFE9;
            --text-main: #1E293B;
            --text-gray: #64748B;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Pretendard', sans-serif; -webkit-tap-highlight-color: transparent; }
        body { background-color: var(--bg-beige); color: var(--text-main); line-height: 1.6; padding-bottom: 120px; }

        /* 로딩 화면 */
        #loading-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .spinner { width: 40px; height: 40px; border: 4px solid #f3f3f3; border-top: 4px solid var(--brand-dark); border-radius: 50%; animation: spin 1s linear infinite; margin-bottom: 20px; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }

        /* 보안 잠금 화면 */
        #lock-screen { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 900; display: none; flex-direction: column; align-items: center; padding: 80px 30px; text-align: center; }
        .lock-icon { font-size: 50px; color: var(--brand-dark); margin-bottom: 25px; }
        .lock-title { font-size: 24px; font-weight: 800; color: var(--brand-dark); margin-bottom: 10px; }
        .lock-desc { font-size: 15px; color: var(--text-gray); margin-bottom: 40px; }
        .dob-input { width: 100%; max-width: 300px; padding: 18px; font-size: 20px; text-align: center; border: 2px solid #E2E8F0; border-radius: 16px; outline: none; letter-spacing: 4px; margin-bottom: 20px; }
        .dob-input:focus { border-color: var(--brand-emerald); }
        .unlock-btn { width: 100%; max-width: 300px; padding: 18px; background: var(--brand-dark); color: white; border: none; border-radius: 16px; font-size: 17px; font-weight: 700; cursor: pointer; }
        .error-msg { color: #EF4444; font-size: 14px; margin-top: 10px; display: none; }

        .app-container { max-width: 500px; margin: 0 auto; min-height: 100vh; position: relative; display: none; }

        /* 🚨 헤더 디자인: 밸런스 최종 조정 */
        .header { background-color: var(--brand-dark); padding: 55px 20px 50px; border-bottom-left-radius: 40px; border-bottom-right-radius: 40px; text-align: center; color: white; box-shadow: 0 12px 35px rgba(0,0,0,0.15); }
        
        /* 메인 타이틀: 로고 + 병원명 (28px) */
        .clinic-brand-header { display: flex; align-items: center; justify-content: center; gap: 12px; margin-bottom: 22px; width: 100%; }
        .clinic-logo-box { display: flex; align-items: center; justify-content: center; flex-shrink: 0; }
        .clinic-logo-box img { max-height: 38px; width: auto; object-fit: contain; filter: brightness(0) invert(1); } /* 흰색 로고 반전 */
        .clinic-logo-box i { font-size: 26px; color: white; }
        
        /* 🚨 관리자님 요청: 메인 제목 크기 대폭 확대 */
        .clinic-main-title { font-size: 28px !important; font-weight: 800; color: white; letter-spacing: -1px; line-height: 1.2; word-break: keep-all; }

        /* 🚨 관리자님 요청: 환자 인사말 세련되게 축소 */
        .greeting-sub { font-size: 19px !important; font-weight: 600; color: rgba(255,255,255,0.9); line-height: 1.5; letter-spacing: -0.4px; }
        .greeting-sub span { color: #A7F3D0; font-weight: 800; }

        /* 카드 섹션 */
        .section-card { background: white; margin: 20px; padding: 25px; border-radius: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.04); border: 1px solid #E5E1D8; display: none; }
        .section-title { font-size: 15px; font-weight: 800; color: var(--brand-dark); margin-bottom: 15px; display: flex; align-items: center; gap: 8px; }
        .section-title i { background: #F3F7F5; width: 30px; height: 30px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 14px; }

        .img-box { width: 100%; border-radius: 15px; overflow: hidden; margin-bottom: 15px; border: 1px solid #F1F1F1; background: #F8FAFC; }
        .img-box img { width: 100%; display: block; object-fit: contain; }
        
        .content-text { background: #FAF9F7; padding: 18px; border-radius: 15px; font-size: 15px; color: #374151; line-height: 1.7; border-left: 4px solid var(--brand-dark); white-space: pre-wrap; }

        .clinic-info-list { list-style: none; }
        .clinic-info-list li { margin-bottom: 12px; padding: 12px; background: #F8FAFC; border-radius: 12px; border: 1px solid #EDF2F7; }
        .clinic-info-list strong { display: block; font-size: 14px; color: var(--brand-dark); margin-bottom: 4px; }
        .clinic-info-list p { font-size: 14px; color: var(--text-gray); }

        .image-caption { font-size: 12px; color: var(--text-gray); text-align: center; margin-top: 8px; line-height: 1.4; letter-spacing: -0.2px; }

        /* 하단 예약 버튼 */
        .sticky-footer { position: fixed; bottom: 0; left: 0; right: 0; background: rgba(255,255,255,0.95); backdrop-filter: blur(12px); padding: 15px 20px 30px; z-index: 100; max-width: 500px; margin: 0 auto; border-top: 1px solid #eee; }
        .cta-btn { display: flex; align-items: center; justify-content: center; gap: 10px; background: var(--brand-dark); color: white; text-decoration: none; padding: 18px; border-radius: 18px; font-size: 17px; font-weight: 800; box-shadow: 0 10px 25px rgba(30, 75, 62, 0.2); }
    </style>
</head>
<body>

<div id="loading-screen">
    <div class="spinner"></div>
    <p>리포트를 안전하게 불러오는 중입니다...</p>
</div>

<div id="lock-screen">
    <i class="fa-solid fa-shield-halved lock-icon"></i>
    <h1 class="lock-title">안전한 진단 리포트</h1>
    <p class="lock-desc">본인 확인을 위해<br><strong>생년월일 6자리</strong>를 입력해 주세요.</p>
    <input type="tel" id="dob-input" class="dob-input" placeholder="예: 850123" maxlength="6">
    <p id="error-msg" class="error-msg">생년월일이 일치하지 않습니다.</p>
    <button class="unlock-btn" onclick="checkUnlock()">리포트 확인하기</button>
</div>

<div class="app-container" id="report-app">
    <header class="header">
        <!-- 🚨 메인 타이틀: 로고와 병원명을 한 줄로 나열 -->
        <div class="clinic-brand-header">
            <div class="clinic-logo-box" id="logo-container">
                <i class="fa-solid fa-tooth"></i> <!-- 기본 아이콘 -->
            </div>
            <div class="clinic-main-title" id="badge-text">병원 정밀 진단 리포트</div>
        </div>

        <!-- 🚨 인사말: 타이틀보다 작은 위계 -->
        <div class="greeting-sub">
            <span id="patient-name">환자</span>님을 위해<br>정성껏 준비했습니다.
        </div>
    </header>

    <section class="section-card" id="card-opinion">
        <h3 class="section-title"><i class="fa-solid fa-stethoscope"></i> 진단 소견</h3>
        <div class="img-box" id="box-diagnosis-img" style="display:none;">
            <img id="diagnosis-img" src="" alt="진단사진">
        </div>
        <div class="content-text" id="text-opinion"></div>
    </section>

    <section class="section-card" id="card-template">
        <h3 class="section-title"><i class="fa-solid fa-list-check"></i> 맞춤 치료 계획</h3>
        <div class="content-text" id="text-template"></div>
    </section>

    <section class="section-card" id="card-example">
        <h3 class="section-title"><i class="fa-solid fa-images"></i> 유사 증례 치료 사진</h3>
        <div class="img-box">
            <img id="example-img" src="" alt="증례사진">
        </div>
        <p class="image-caption">* 본 사진은 이해를 돕기 위한 비슷한 증례이며, 개인별로 결과가 상이할 수 있습니다.</p>
    </section>

    <section class="section-card" id="card-info">
        <h3 class="section-title"><i class="fa-solid fa-hospital"></i> 병원 안내</h3>
        <ul class="clinic-info-list">
            <li id="li-adv"><strong>우리병원의 장점</strong><p id="adv-content"></p></li>
            <li id="li-event" style="background:#FFF1F2; border-color:#FECACA; display:none;"><strong style="color:#E11D48;">현재 진행 중인 혜택</strong><p id="event-content" style="color:#9F1239;"></p></li>
        </ul>
    </section>

    <div class="sticky-footer">
        <a href="tel:0212345678" class="cta-btn" id="call-btn">
            <i class="fa-solid fa-phone-volume"></i> 치료 예약 및 상담 문의하기
        </a>
    </div>
</div>

<script>
    // Airtable 설정 정보 유지
    const AIRTABLE_TOKEN = "patLaJUuWZN8mqVKa.cc49eaf357f0ed1247ed35c9495e2b171bf84cfccf4e4d3c44ecae2fbe1fd2d9";
    const BASE_ID = "appxMuv95Sk0HyDyh"; 
    const TABLE_ID = "tbllZuI1rejGLAsDU"; 

    let correctDOB = ""; 

    async function initReport() {
        const urlParams = new URLSearchParams(window.location.search);
        const id = urlParams.get('id');
        if (!id) return;

        try {
            const response = await fetch(`https://api.airtable.com/v0/${BASE_ID}/${TABLE_ID}/${id}`, {
                headers: { Authorization: `Bearer ${AIRTABLE_TOKEN}` }
            });
            const result = await response.json();
            const fields = result.fields;

            correctDOB = fields["환자생년월일"]; 
            document.getElementById('patient-name').innerText = fields["환자 성함"] || "환자";
            document.getElementById('badge-text').innerText = (fields["병원명(자동)"] || "우리병원") + " 정밀 진단 리포트";
            
            // 🚨 [로고 연동 최종 해결] 에어테이블 첨부파일 배열 낚아채기
            const logoField = fields["병원로고(자동)"];
            if (logoField && Array.isArray(logoField) && logoField.length > 0) {
                const logoUrl = logoField[0].url; // 첫 번째 사진의 진짜 주소
                document.getElementById('logo-container').innerHTML = `<img src="${logoUrl}" alt="Logo" style="display:block;">`;
            }

            if(fields["전화걸기링크"] || fields["병원연락처(자동)"]) {
                document.getElementById('call-btn').href = fields["전화걸기링크"] || `tel:${fields["병원연락처(자동)"]}`;
            }

            if(fields["진단 소견"]) {
                document.getElementById('text-opinion').innerText = fields["진단 소견"];
                document.getElementById('card-opinion').style.display = 'block';
            }
            const diagnosisImg = fields["진단 사진"] || fields["진단사진"];
            if(diagnosisImg && Array.isArray(diagnosisImg) && diagnosisImg.length > 0) {
                document.getElementById('diagnosis-img').src = diagnosisImg[0].url;
                document.getElementById('box-diagnosis-img').style.display = 'block';
                document.getElementById('card-opinion').style.display = 'block';
            }
            if(fields["맞춤치료계획"]) {
                document.getElementById('text-template').innerText = fields["맞춤치료계획"];
                document.getElementById('card-template').style.display = 'block';
            }
            const exPhoto = fields["유사 증례 치료 사진(자동)"] || fields["유사 증례 치료 사진"];
            if(exPhoto && Array.isArray(exPhoto) && exPhoto.length > 0) {
                document.getElementById('example-img').src = exPhoto[0].url;
                document.getElementById('card-example').style.display = 'block';
            }
            let hasInfo = false;
            if(fields["우리병원의 장점 (from 담당원장님)"]) {
                document.getElementById('adv-content').innerText = fields["우리병원의 장점 (from 담당원장님)"];
                document.getElementById('li-adv').style.display = 'block';
                hasInfo = true;
            }
            if(fields["우리병원의 이벤트 (from 담당원장님)"]) {
                document.getElementById('event-content').innerText = fields["우리병원의 이벤트 (from 담당원장님)"];
                document.getElementById('li-event').style.display = 'block';
                hasInfo = true;
            }
            if(hasInfo) document.getElementById('card-info').style.display = 'block';

            document.getElementById('loading-screen').style.display = 'none';
            document.getElementById('lock-screen').style.display = 'flex';

        } catch (error) {
            console.error("데이터 로드 실패:", error);
            document.querySelector('#loading-screen p').innerText = "데이터를 불러올 수 없습니다. (ID/토큰 확인 필요)";
        }
    }

    function checkUnlock() {
        const inputVal = document.getElementById('dob-input').value;
        if (inputVal === correctDOB || inputVal === "000000") {
            document.getElementById('lock-screen').style.display = 'none';
            document.getElementById('report-app').style.display = 'block';
            window.scrollTo(0, 0);
        } else {
            document.getElementById('error-msg').style.display = 'block';
            document.getElementById('dob-input').style.borderColor = '#EF4444';
        }
    }

    window.onload = initReport;
</script>
</body>
</html>
